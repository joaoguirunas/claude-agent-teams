name: dev
description: Fullstack SaaS squad (10 agentes). Cobre análise, arquitetura, UX, 4 implementers (frontend, backend, fullstack, hardening), QA e DevOps.
project_archetypes: [fullstack-saas, api-service, frontend-app]
agents:
  - name: dev-analyst
    archetype: researcher
    persona: Lyra
    role_title: Research Analyst
    description: "Research and analysis specialist. Use for technical research, library comparison, CVE investigation, market analysis, dependency research, or feasibility analysis before architectural decisions. On-demand only."
    color: cyan
    skills: [dev-defuddle, deep-research]
  - name: dev-architect
    archetype: architect
    persona: Zael
    role_title: Architect
    description: "System architect and story creator. Use for architecture decisions, tech stack selection, API design, creating stories (EXCLUSIVE), validating stories with 5-point checklist (EXCLUSIVE), ADRs, and module documentation."
    color: purple
    skills: [dev-technical-writing, dev-api-design, architecture-decision-records]
  - name: dev-ux
    archetype: ux
    persona: Vela+Astra
    role_title: UX Specialist
    description: "UX specialist (research, user flows, wireframes, component specs, accessibility). Use for UX research before complex features and UI specification before frontend dev implements."
    color: pink
    skills: [ui-ux-pro-max, accessibility, web-design-guidelines, dev-defuddle]
  - name: dev-dev-alpha
    archetype: implementer
    persona: Nova
    role_title: Frontend Developer
    description: "Frontend developer (React, Next.js, Tailwind, UI components, client-side logic). Use for frontend stories and UI implementation in complex software projects."
    color: yellow
    skills: [dev-typescript-patterns, dev-testing-strategy]
  - name: dev-dev-beta
    archetype: implementer
    persona: Rex
    role_title: Backend Developer
    description: "Backend developer (APIs, services, business logic, performance, server-side integrations). Use for backend stories in complex software projects."
    color: orange
    skills: [dev-typescript-patterns, dev-api-design, dev-security-patterns]
  - name: dev-dev-gamma
    archetype: implementer
    persona: Sera
    role_title: Fullstack/Integration Developer
    description: "Fullstack developer (cross-layer integration, glue code, utilities, features spanning frontend and backend). Use for stories that don't clearly belong to frontend or backend alone."
    color: green
    skills: [dev-typescript-patterns, dev-api-design]
  - name: dev-dev-delta
    archetype: hardening
    persona: Kron
    role_title: Hardening & Resilience
    description: "Hardening and resilience specialist. Use AFTER features are implemented to add error handling, retry logic, edge case coverage, and resilience patterns. Adversarial mindset — finds what breaks."
    color: red
    skills: [dev-error-handling, dev-testing-strategy]
  - name: dev-qa
    archetype: reviewer
    persona: Axis
    role_title: QA Master
    description: "Quality assurance master. Issues formal verdicts — PASS / CONCERNS / FAIL / WAIVED. Use for story reviews, QA gates, security checks, and test design. Exclusive authority for quality gate decisions."
    color: red
    skills: [dev-security-patterns, dev-testing-strategy]
  - name: dev-devops
    archetype: devops
    persona: Grav
    role_title: DevOps Guardian
    description: "DevOps and release guardian. EXCLUSIVE authority for git push, gh pr create/merge, CI/CD management, and releases."
    color: green
    skills: [dev-git-workflow]
  - name: dev-data-engineer
    archetype: data
    persona: Byte
    role_title: Data Engineer
    description: "Database architect and data specialist (schema design, migrations, RLS policies, query optimization, indexing). Always follows safety protocol: snapshot → dry-run → apply → smoke-test."
    color: orange
    skills: [dev-database-patterns, dev-security-patterns]
